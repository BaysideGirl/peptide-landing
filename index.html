document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FINAL CTA -->\n  <section id=\"waitlist\" style=\"padding:0 32px 100px;\">\n    <div data-reveal=\"\" style=\"max-width:1100px; margin:0 auto; position:relative; overflow:hidden; border-radius:36px; background:linear-gradient(135deg,#0B1230 0%,#241A5E 55%,#0B1230 100%); padding:72px 48px; text-align:center;\">\n      <div style=\"position:absolute; top:-80px; left:-40px; width:300px; height:300px; background:#18E0D0; filter:blur(90px); opacity:.4; border-radius:50%; animation:blob 18s ease-in-out infinite;\"><\u002Fdiv>\n      <div style=\"position:absolute; bottom:-100px; right:-30px; width:320px; height:320px; background:#FF7A66; filter:blur(100px); opacity:.4; border-radius:50%; animation:blobB 21s ease-in-out infinite;\"><\u002Fdiv>\n      <div style=\"position:relative; z-index:2;\">\n        <span style=\"display:inline-block; color:#B6FF3C; font-weight:700; font-size:14px; letter-spacing:.12em; text-transform:uppercase;\">Be first in line<\u002Fspan>\n        <h2 data-tw=\"\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(36px,5.4vw,68px); line-height:1; letter-spacing:-.03em; margin:14px auto 0; color:#fff; max-width:760px;\">Explore. Learn. Join the waitlist.<\u002Fh2>\n        <p style=\"color:#B9C0D9; font-size:18px; margin:18px auto 0; max-width:520px; font-weight:500;\">No spam, no pressure — just an early invite when the blends drop.<\u002Fp>\n        <form data-waitlist=\"\" style=\"display:flex; gap:12px; max-width:480px; margin:32px auto 0; flex-wrap:wrap; justify-content:center;\">\n          <input type=\"email\" required=\"\" placeholder=\"you@email.com\" style=\"flex:1; min-width:220px; padding:16px 22px; border-radius:100px; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#fff; font-size:16px; font-family:inherit; outline:none;\">\n          <button type=\"submit\" data-magnetic=\"\" style=\"background:#B6FF3C; color:#0B1230; padding:16px 30px; border-radius:100px; border:none; cursor:pointer; font-weight:800; font-size:16px; font-family:inherit; transition:transform .25s;\">Join waitlist →<\u002Fbutton>\n        <\u002Fform>\n        <p data-waitlist-msg=\"\" style=\"color:#B6FF3C; font-weight:700; font-size:15px; margin:16px 0 0; height:18px; opacity:0; transition:opacity .3s;\">You're on the list — welcome aboard! ✦<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#0B1230; color:#fff; padding:60px 32px 40px;\">\n    <div style=\"max-width:1240px; margin:0 auto;\">\n      <div style=\"display:flex; justify-content:space-between; gap:40px; flex-wrap:wrap; padding-bottom:40px; border-bottom:1px solid rgba(255,255,255,.1);\">\n        <div style=\"max-width:300px;\">\n          <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:14px;\">\n            <svg width=\"30\" height=\"30\" viewBox=\"0 0 34 34\" fill=\"none\"><circle cx=\"11\" cy=\"11\" r=\"6\" fill=\"#18E0D0\"><\u002Fcircle><circle cx=\"23\" cy=\"22\" r=\"6\" fill=\"#FF7A66\"><\u002Fcircle><circle cx=\"24\" cy=\"9\" r=\"3.4\" fill=\"#B6FF3C\"><\u002Fcircle><line x1=\"11\" y1=\"11\" x2=\"23\" y2=\"22\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fline><line x1=\"11\" y1=\"11\" x2=\"24\" y2=\"9\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fline><\u002Fsvg>\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:19px;\">peptide<span style=\"color:#18E0D0;\">.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"color:#9AA2C2; font-size:14px; line-height:1.6; margin:0;\">Science-inspired blends for focus, recovery, and everyday peak. A lifestyle brand — not medical advice.<\u002Fp>\n          <p style=\"color:#5A6488; font-size:12px; margin:16px 0 0; font-style:italic;\">[ brand name placeholder ]<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:56px; flex-wrap:wrap;\">\n          <div>\n            <div style=\"font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#5A6488; margin-bottom:14px;\">Explore<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px; font-size:14px; font-weight:600;\">\n              <a href=\"#science\" style=\"color:#C3CAE0; text-decoration:none;\">The science<\u002Fa>\n              <a href=\"#blends\" style=\"color:#C3CAE0; text-decoration:none;\">Blends<\u002Fa>\n              <a href=\"#vibe\" style=\"color:#C3CAE0; text-decoration:none;\">Find your vibe<\u002Fa>\n              <a href=\"#faq\" style=\"color:#C3CAE0; text-decoration:none;\">FAQ<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#5A6488; margin-bottom:14px;\">Brand<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px; font-size:14px; font-weight:600;\">\n              <a href=\"#top\" style=\"color:#C3CAE0; text-decoration:none;\">Story<\u002Fa>\n              <a href=\"#waitlist\" style=\"color:#C3CAE0; text-decoration:none;\">Waitlist<\u002Fa>\n              <a href=\"#\" style=\"color:#C3CAE0; text-decoration:none;\">Sourcing<\u002Fa>\n              <a href=\"#\" style=\"color:#C3CAE0; text-decoration:none;\">Contact<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; padding-top:24px;\">\n        <p style=\"color:#5A6488; font-size:12px; margin:0; max-width:640px; line-height:1.6;\">Design mockup for presentation purposes only. These statements have not been evaluated by any regulatory authority. This product is not intended to diagnose, treat, cure, or prevent any disease.<\u002Fp>\n        <p style=\"color:#5A6488; font-size:12px; margin:0;\">© 2026 — All placeholder content.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const root = document.getElementById('pep-root');\n    if (!root) return;\n\n    // ---- cursor-less typewriter that preserves inner markup (spans, <br>) ----\n    const typeEl = (el) => {\n      const nodes = [];\n      const walk = (node) => {\n        node.childNodes.forEach((c) => {\n          if (c.nodeType === 3) { if (c.textContent.length) nodes.push(c); }\n          else if (c.nodeType === 1) walk(c);\n        });\n      };\n      walk(el);\n      const originals = nodes.map((n) => n.textContent);\n      nodes.forEach((n) => { n.textContent = ''; });\n      el.style.visibility = 'visible';\n      const total = originals.reduce((s, t) => s + t.length, 0);\n      const speed = total > 26 ? 22 : 46;\n      let ni = 0, ci = 0;\n      const tick = () => {\n        if (ni >= nodes.length) return;\n        const orig = originals[ni];\n        if (ci < orig.length) { nodes[ni].textContent += orig[ci]; ci++; }\n        if (ci >= orig.length) { ni++; ci = 0; }\n        setTimeout(tick, speed);\n      };\n      tick();\n    };\n\n    // ---- scroll reveals + trigger typewriters ----\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (!e.isIntersecting) return;\n        const el = e.target;\n        el.classList.add('in');\n        if (el.hasAttribute('data-tw') && !el.dataset.typed) { el.dataset.typed = '1'; typeEl(el); }\n        io.unobserve(el);\n      });\n    }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' });\n    root.querySelectorAll('[data-reveal],[data-tw]').forEach((el) => io.observe(el));\n\n    // ---- magnetic buttons ----\n    root.querySelectorAll('[data-magnetic]').forEach((btn) => {\n      btn.addEventListener('mousemove', (e) => {\n        const r = btn.getBoundingClientRect();\n        const x = e.clientX - r.left - r.width / 2;\n        const y = e.clientY - r.top - r.height / 2;\n        btn.style.transform = 'translate(' + (x * 0.3) + 'px,' + (y * 0.45) + 'px)';\n      });\n      btn.addEventListener('mouseleave', () => { btn.style.transform = 'translate(0,0)'; });\n    });\n\n    // ---- 3D tilt cards ----\n    root.querySelectorAll('[data-tilt]').forEach((card) => {\n      card.addEventListener('mousemove', (e) => {\n        const r = card.getBoundingClientRect();\n        const px = (e.clientX - r.left) / r.width - 0.5;\n        const py = (e.clientY - r.top) / r.height - 0.5;\n        card.style.transform = 'perspective(720px) rotateY(' + (px * 9) + 'deg) rotateX(' + (-py * 9) + 'deg) translateY(-8px)';\n        card.style.boxShadow = '0 36px 60px -32px rgba(11,18,48,.45)';\n      });\n      card.addEventListener('mouseleave', () => {\n        card.style.transform = 'perspective(720px) rotateY(0) rotateX(0) translateY(0)';\n        card.style.boxShadow = '0 20px 50px -30px rgba(11,18,48,.3)';\n      });\n    });\n\n    // ---- vibe quiz ----\n    const result = root.querySelector('#quiz-result');\n    root.querySelectorAll('[data-vibe]').forEach((b) => {\n      b.addEventListener('click', () => {\n        root.querySelectorAll('[data-vibe]').forEach((x) => {\n          x.style.borderColor = 'transparent';\n          x.style.transform = 'none';\n          x.style.boxShadow = 'none';\n        });\n        b.style.borderColor = '#7C5CFF';\n        b.style.transform = 'translateY(-5px)';\n        b.style.boxShadow = '0 22px 44px -22px rgba(124,92,255,.55)';\n        root.querySelector('#quiz-result-emoji').textContent = b.dataset.emoji;\n        root.querySelector('#quiz-result-line').textContent = b.dataset.line;\n        result.style.maxHeight = '420px';\n        result.style.opacity = '1';\n        // typewriter the matched blend name\n        const nameEl = root.querySelector('#quiz-result-name');\n        const blend = b.dataset.blend;\n        nameEl.textContent = '';\n        let i = 0;\n        const t = () => { if (i <= blend.length) { nameEl.textContent = blend.slice(0, i); i++; setTimeout(t, 70); } };\n        t();\n      });\n    });\n\n    // ---- FAQ accordion ----\n    root.querySelectorAll('[data-faq]').forEach((q) => {\n      q.addEventListener('click', () => {\n        const item = q.parentElement;\n        const ans = item.querySelector('[data-faq-a]');\n        const ic = item.querySelector('[data-faq-i]');\n        const open = item.dataset.open === '1';\n        item.dataset.open = open ? '0' : '1';\n        ans.style.maxHeight = open ? '0px' : ans.scrollHeight + 'px';\n        ic.style.transform = open ? 'rotate(0deg)' : 'rotate(135deg)';\n        item.style.borderColor = open ? 'rgba(11,18,48,.08)' : 'rgba(124,92,255,.4)';\n      });\n    });\n\n    // ---- waitlist mock submit ----\n    const form = root.querySelector('[data-waitlist]');\n    if (form) {\n      form.addEventListener('submit', (e) => {\n        e.preventDefault();\n        const msg = root.querySelector('[data-waitlist-msg]');\n        if (msg) msg.style.opacity = '1';\n        form.reset();\n      });\n    }\n\n    // ---- safety fallback so nothing stays hidden ----\n    setTimeout(() => {\n      root.querySelectorAll('[data-reveal]:not(.in)').forEach((el) => el.classList.add('in'));\n      root.querySelectorAll('[data-tw]').forEach((el) => {\n        if (!el.dataset.typed) { el.dataset.typed = '1'; el.style.visibility = 'visible'; }\n      });\n    }, 6000);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
